<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OI Momentum v2.0 – Intraday Trend Following</title>
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    :root{
      --bg:#0b0e14;--card:#151c28;--border:#2a3544;
      --t1:#e4e8ed;--t2:#8b99a8;
      --green:#00dc82;--red:#f5365c;--blue:#3b82f6;--yellow:#fbbf24;
    }
    html,body{background:var(--bg);color:var(--t1);font-family:'Segoe UI',sans-serif;min-height:100vh;overflow-x:hidden;}
    .hdr{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:200;}
    .logo{font-size:16px;font-weight:700;}
    .logo span{color:var(--green);}
    .hdr-right{display:flex;gap:10px;align-items:center;}
    .auto-lbl{display:flex;gap:5px;font-size:12px;color:var(--t2);align-items:center;cursor:pointer;}
    .auto-lbl input{accent-color:var(--green);}
    .btn-out{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px;}
    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
    @keyframes revPulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 50px);padding:16px;}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;width:100%;max-width:380px;}
    .login-box h2{text-align:center;margin-bottom:6px;font-size:18px;}
    .login-box p{text-align:center;color:var(--t2);font-size:12px;margin-bottom:22px;}
    .fld label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px;}
    .fld input{width:100%;background:var(--bg);border:1px solid var(--border);padding:10px;color:var(--t1);border-radius:6px;font-size:13px;margin-bottom:14px;}
    .fld input:focus{outline:none;border-color:var(--blue);}
    .btn-login{width:100%;background:var(--green);border:none;padding:12px;border-radius:6px;font-weight:700;font-size:14px;color:#000;cursor:pointer;}
    .dash{display:flex;flex-direction:column;gap:10px;padding:10px;}
    .chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:visible;position:relative;}
    .chart-card.minimized #chartWrap,.chart-card.minimized .ohlc-row,.chart-card.minimized .sig-bar,.chart-card.minimized #emaLeg{display:none;}
    .chart-card.minimized{height:auto!important;}
    .chart-top{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap;}
    .chart-sym{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;}
    #barInfo{font-size:10px;color:var(--t2);}
    .tf-row{display:flex;align-items:center;gap:3px;flex-wrap:wrap;}
    .tf-btn{background:none;border:none;color:var(--t2);padding:4px 8px;border-radius:3px;cursor:pointer;font-size:11px;font-weight:600;transition:all 0.15s;}
    .tf-btn:hover{color:var(--t1);}
    .tf-btn.act{background:var(--blue);color:#fff;border-radius:3px;}
    .ind-btn{background:none;border:1px solid var(--border);color:var(--t2);padding:4px 9px;border-radius:3px;cursor:pointer;font-size:11px;}
    .ind-btn:hover{border-color:var(--t2);color:var(--t1);}
    .ohlc-row{padding:4px 10px;font-size:11px;font-family:monospace;display:flex;gap:12px;flex-wrap:wrap;border-bottom:1px solid var(--border);align-items:center;min-height:24px;background:rgba(0,0,0,0.15);}
    .oh{color:var(--t1);} .hh{color:var(--green);} .lh{color:var(--red);} .ch{color:var(--yellow);font-weight:700;}
    #cTime{color:var(--t2);font-size:10px;margin-left:auto;}
    #chartWrap{position:relative;width:100%;height:320px;}
    #chart{width:100%;height:100%;}
    #loadMsg{position:absolute;inset:0;display:none;align-items:center;justify-content:center;color:var(--t2);font-size:13px;pointer-events:none;background:rgba(21,28,40,0.6);z-index:10;}
    #emaLeg{position:absolute;top:28px;left:4px;z-index:40;display:flex;flex-direction:column;gap:2px;pointer-events:none;}
    #emaLeg.minimized{display:none!important;}
    #emaMinBtn{position:absolute;top:4px;left:4px;z-index:45;background:none;border:1px solid var(--border);color:var(--t2);padding:1px 4px;border-radius:2px;cursor:pointer;font-size:9px;}
    .el-item{display:flex;align-items:center;gap:4px;font-size:10px;font-family:monospace;pointer-events:all;cursor:pointer;padding:2px 5px;border-radius:3px;background:rgba(11,14,20,0.85);border:1px solid rgba(255,255,255,0.04);}
    .el-item:hover{background:rgba(42,53,68,0.95);}
    .el-dot{width:12px;border-radius:1px;flex-shrink:0;}
    .el-lbl{color:var(--t2);}
    .el-val{color:var(--t1);font-weight:700;min-width:48px;}
    .el-x{color:#555;font-size:9px;margin-left:2px;}
    .el-x:hover{color:var(--red);}
    .sig-bar{padding:7px;font-size:12px;font-weight:700;text-align:center;border-top:1px solid var(--border);border-radius:0 0 10px 10px;}
    .sig-bar.bull{background:rgba(0,220,130,0.08);color:var(--green);}
    .sig-bar.bear{background:rgba(245,54,92,0.08);color:var(--red);}
    .sig-bar.neu{background:rgba(251,191,36,0.06);color:var(--yellow);}
    #indPanel{display:none;position:absolute;right:10px;top:44px;z-index:300;background:#1a2333;border:1px solid var(--border);border-radius:8px;padding:10px;width:160px;box-shadow:0 8px 28px rgba(0,0,0,0.6);}
    .ip-title{font-size:10px;color:var(--t2);margin-bottom:8px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;}
    .ip-row{display:flex;align-items:center;justify-content:space-between;padding:7px 6px;cursor:pointer;border-radius:4px;font-size:12px;color:var(--t2);}
    .ip-row:hover{background:rgba(59,130,246,0.12);color:var(--t1);}
    .ip-plus{font-size:17px;color:var(--green);line-height:1;}
    .ip-chk{font-size:13px;color:var(--t2);line-height:1;}
    .ip-chk.on{color:var(--green);}
    #emaModal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;padding:16px;}
    #emaModal.open{display:flex;}
    .mbox{background:#1a2333;border:1px solid var(--border);border-radius:10px;padding:20px;width:100%;max-width:290px;box-shadow:0 20px 60px rgba(0,0,0,0.7);}
    .mf{margin-bottom:13px;}
    .mf label{display:block;font-size:11px;color:var(--t2);margin-bottom:5px;}
    .mf input[type="number"],.mf select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--t1);padding:8px;border-radius:5px;font-size:13px;}
    .mf input[type="number"]:focus,.mf select:focus{outline:none;border-color:var(--blue);}
    .color-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
    .csw{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
    .csw.sel{border-color:#fff;}
    .cpick{width:34px;height:22px;border-radius:4px;cursor:pointer;border:1px solid var(--border);padding:1px;background:none;}
    .mact{display:flex;gap:8px;margin-top:6px;}
    .mact button{flex:1;padding:9px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;border:none;}
    .btn-ok{background:var(--blue);color:#fff;}
    .btn-del{background:rgba(245,54,92,0.15);color:var(--red);}
    .ctrl-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px;}
    .ctrl-row select{flex:1;min-width:130px;background:var(--bg);border:1px solid var(--border);color:var(--t1);padding:8px 10px;border-radius:5px;font-size:13px;}
    .ctrl-row select:focus{outline:none;border-color:var(--blue);}
    .btn-load{background:var(--blue);color:#fff;border:none;padding:8px 16px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;}
    .oi-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
    .oi-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;}
    .oi-lbl{font-size:10px;color:var(--t2);margin-bottom:3px;}
    .oi-val{font-size:13px;font-weight:700;font-family:monospace;}
    .oi-val.r{color:var(--red);} .oi-val.g{color:var(--green);}
    .chain-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .chain-hdr{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:600;}
    .badge{background:var(--blue);color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;}
    .chain-wrap{overflow-x:auto;max-height:360px;overflow-y:auto;}
    .ctbl{width:100%;border-collapse:collapse;font-size:11px;}
    .ctbl th{background:var(--bg);padding:8px;font-weight:600;color:var(--t2);position:sticky;top:0;z-index:1;text-align:right;white-space:nowrap;}
    .ctbl th:first-child,.ctbl th:last-child{text-align:center;}
    .ctbl td{padding:7px 8px;border-bottom:1px solid var(--border);font-family:monospace;text-align:right;}
    .ctbl td:first-child,.ctbl td:last-child{text-align:center;}
    .atm{background:rgba(251,191,36,0.08);}
    .cr{color:var(--red);} .cg{color:var(--green);}
    .sb{color:var(--green);font-weight:700;} .ss{color:var(--red);font-weight:700;}
    .sig-log-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:10px;}
    .sig-log-hdr{padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
    .sig-log-body{display:none;max-height:200px;overflow-y:auto;padding:8px;}
    .sig-log-body.open{display:block;}
    .sig-item{padding:6px 8px;font-size:11px;border-bottom:1px solid rgba(42,53,68,0.5);display:flex;justify-content:space-between;}
    .sig-time{color:var(--t2);}
    .sig-type.bull{color:var(--green);font-weight:700;}
    .sig-type.bear{color:var(--red);font-weight:700;}
    .trade-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-top:10px;}
    .trade-hdr{padding:10px 12px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
    .trade-body{display:none;padding:12px;}
    .trade-body.open{display:block;}
    .trade-mode{display:flex;gap:12px;margin-bottom:12px;font-size:12px;color:var(--t2);}
    .trade-mode label{cursor:pointer;}
    .trade-cfg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
    .trade-status{padding:8px;text-align:center;font-size:12px;font-weight:700;border-radius:4px;margin-bottom:10px;}
    .trade-status.running{background:rgba(0,220,130,0.15);color:var(--green);}
    .trade-status.stopped{background:rgba(245,54,92,0.1);color:var(--red);}
    #tradeBtn{width:100%;padding:10px;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:13px;}
    #tradeBtn.start{background:var(--green);color:#000;}
    #tradeBtn.stop{background:var(--red);color:#fff;}
    #tradeLog{max-height:120px;overflow-y:auto;padding:6px;background:var(--bg);border-radius:4px;font-size:11px;color:var(--t2);}
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .stat-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
    .stat-lbl{font-size:10px;color:var(--t2);margin-bottom:3px;}
    .stat-val{font-size:14px;font-weight:700;font-family:monospace;}
    .stat-val.g{color:var(--green);} .stat-val.r{color:var(--red);} .stat-val.y{color:var(--yellow);}
    .sig-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:center;gap:14px;}
    .sig-main{flex:1;text-align:center;}
    .sig-val{font-size:22px;font-weight:700;padding:10px 16px;border-radius:8px;margin-bottom:4px;}
    .sv-bull{background:rgba(0,220,130,0.15);color:var(--green)}
    .sv-bear{background:rgba(245,54,92,0.15);color:var(--red);}
    .sv-neu{background:rgba(251,191,36,0.1);color:var(--yellow);}
    .sig-sub{font-size:11px;color:var(--t2);}
    .side-col{display:none;}
    .main-col{width:100%;display:flex;flex-direction:column;gap:10px;}
    @media(min-width:768px){
      .dash{flex-direction:row;align-items:flex-start;padding:14px;}
      .side-col{width:260px;flex-shrink:0;display:flex;flex-direction:column;gap:10px;}
      .main-col{flex:1;display:flex;flex-direction:column;gap:10px;}
      .stats-grid{display:none;}
      #chartWrap{height:380px;}
    }
    @media(max-width:767px){
      .side-col{display:none!important;}
    }
  </style>
</head>

    <label class="auto-lbl"><input type="checkbox" id="autoChk" checked onchange="toggleAuto()"> Auto</label>
